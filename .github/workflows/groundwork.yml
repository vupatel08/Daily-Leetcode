name: Groundwork Decision Check

# Dogfooding: Groundwork checks its own PRs against its own decision graph.
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  groundwork:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm install

      - name: Build engine + action
        run: |
          npm run build --workspace=@groundwork/shared
          npm run build --workspace=@groundwork/mcp-server
          npm run build --workspace=@groundwork/github-action

      - name: Run Groundwork check
        uses: ./packages/github-action
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fail-on-p0: true
