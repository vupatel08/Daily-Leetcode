# Groundwork PR enforcement workflow.
# Copy this into .github/workflows/ in your own repository.
name: Groundwork Decision Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  groundwork:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Groundwork Decision Check
        uses: groundwork-dev/decision-check@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fail-on-p0: true
